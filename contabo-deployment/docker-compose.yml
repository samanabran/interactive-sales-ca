# Contabo Deployment - Complete Setup
# EIGER MARVEL HR & SGC TECH AI Voice Agent Platform
# Zero Cost: Gemini TTS (FREE) + Edge TTS (FREE) + Whisper.cpp (FREE)

version: '3.8'

services:
  # ============================================
  # Ollama GPU Service (AI LLM)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: odoo-ollama
    runtime: nvidia # Requires NVIDIA GPU on Contabo
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    environment:
      - OLLAMA_MODELS=llama3.1:8b,llama3.2:3b
    restart: unless-stopped
    networks:
      - contabo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Edge TTS Server (FREE - No API Key)
  # Provides 200+ voices as backup for Gemini
  # ============================================
  tts-server:
    build:
      context: .
      dockerfile: Dockerfile.tts-server
    container_name: odoo-tts-server
    ports:
      - "5050:5050"
    restart: unless-stopped
    networks:
      - contabo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # Whisper.cpp Transcription Server (FREE)
  # Local STT with GPU acceleration
  # OpenAI-compatible API (same as Whisper API)
  # ============================================
  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    container_name: odoo-whisper
    runtime: nvidia # GPU acceleration
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "9000:9000"
    volumes:
      - ./whisper-models:/models
    environment:
      - WHISPER_MODEL=base # tiny, base, small, medium, large
      - WHISPER_LANGUAGE=en # English + Arabic support
    restart: unless-stopped
    networks:
      - contabo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Nginx Reverse Proxy
  # Routes traffic to all services
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: odoo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro # SSL certificates
    depends_on:
      - ollama
      - tts-server
      - whisper
    restart: unless-stopped
    networks:
      - contabo-network

networks:
  contabo-network:
    driver: bridge
