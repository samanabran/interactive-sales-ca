version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: scholarix-postgres
    environment:
      POSTGRES_DB: scholarix_crm
      POSTGRES_USER: scholarix
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - contabo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarix -d scholarix_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (for future job queue)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: scholarix-redis
    restart: unless-stopped
    networks:
      - contabo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # API Server (Hono on Node.js)
  # ============================================
  api:
    build:
      context: ..
      dockerfile: contabo-deployment/Dockerfile.api
    container_name: scholarix-api
    environment:
      - PORT=8787
      - NODE_ENV=production
      - APP_URL=https://train.scholarixglobal.com
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=scholarix_crm
      - DB_USER=scholarix
      - DB_PASSWORD=${DB_PASSWORD}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - RECORDINGS_DIR=/data
    volumes:
      - recordings-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - contabo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Nginx Reverse Proxy
  # Routes traffic to all services
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: odoo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - recordings-data:/data:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - contabo-network

  # ============================================
  # Ollama GPU Service (AI LLM — pre-running)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: odoo-ollama
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - contabo-network

  # ============================================
  # Edge TTS Server (FREE — 200+ voices)
  # ============================================
  tts-server:
    build:
      context: .
      dockerfile: Dockerfile.tts-server
    container_name: odoo-tts-server
    ports:
      - "5050:5050"
    restart: unless-stopped
    networks:
      - contabo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  recordings-data:
  ollama-data:

networks:
  contabo-network:
    driver: bridge
