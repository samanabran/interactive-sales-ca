# Nginx Configuration for Contabo VPS
# Routes traffic to Ollama, TTS Server, Whisper, and Cloudflare Worker

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Upstream services
    upstream ollama {
        server ollama:11434;
    }

    upstream tts_server {
        server tts-server:5050;
    }

    upstream whisper {
        server whisper:9000;
    }

    server {
        listen 80;
        server_name 80.241.218.108 localhost;

        # ============================================
        # Ollama API (LLM - Port 11434)
        # ============================================
        location /ollama/ {
            proxy_pass http://ollama/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for LLM
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # ============================================
        # Edge TTS Server (Port 5050)
        # ============================================
        location /tts/ {
            proxy_pass http://tts_server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ============================================
        # Whisper.cpp STT (Port 9000)
        # ============================================
        location /whisper/ {
            proxy_pass http://whisper/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # File upload timeout
            client_max_body_size 50M;
            proxy_read_timeout 300s;
        }

        # ============================================
        # Health Check
        # ============================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================================
        # Default: Redirect to Cloudflare Pages (Frontend)
        # ============================================
        location / {
            # For now, serve a simple status page
            return 200 "Odoo B2B Voice Agent Platform - Services Running\nOllama: /ollama/\nTTS: /tts/\nWhisper: /whisper/\n";
            add_header Content-Type text/plain;
        }
    }
}
