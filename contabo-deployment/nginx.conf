events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Upstream services
    upstream web {
        server web:3000;
    }

    upstream api {
        server api:8787;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name train.scholarixglobal.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — main application
    server {
        listen 443 ssl;
        server_name train.scholarixglobal.com;

        ssl_certificate     /etc/letsencrypt/live/train.scholarixglobal.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/train.scholarixglobal.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API proxy
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket upgrade headers (future-proofing)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 120s;
        }

        # Recording files served directly from the shared volume
        location /recordings/ {
            alias /data/recordings/;
            add_header Cache-Control "public, max-age=31536000";
            access_log off;
        }

        # Frontend (catch-all)
        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
